name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            name: linux
          - os: macos-latest
            name: macos
          - os: windows-latest
            name: windows

    runs-on: ${{ matrix.os }}
    name: Build (${{ matrix.name }})

    steps:
      - uses: actions/checkout@v4

      # ── Linux ────────────────────────────────────────────────────────────
      - name: Install raylib (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            libasound2-dev libx11-dev libxrandr-dev libxi-dev \
            libgl1-mesa-dev libglu1-mesa-dev libxcursor-dev \
            libxinerama-dev libwayland-dev libxkbcommon-dev
          git clone --depth 1 --branch 5.5 https://github.com/raysan5/raylib.git _raylib
          cmake -S _raylib -B _raylib/build \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_SHARED_LIBS=OFF \
            -DBUILD_EXAMPLES=OFF
          sudo cmake --build _raylib/build --target install -j$(nproc)

      # ── macOS ────────────────────────────────────────────────────────────
      - name: Install raylib (macOS)
        if: runner.os == 'macOS'
        run: brew install raylib

      # ── Windows (MSYS2 / MinGW-w64) ──────────────────────────────────────
      # MinGW bundles GLFW inside the raylib package, avoiding the link errors
      # that MSVC + vcpkg produce. GCC also handles raylib's C99 compound-literal
      # syntax without complaints.
      - name: Install raylib (Windows)
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-cmake
            mingw-w64-ucrt-x86_64-ninja
            git

      - name: Build raylib from source (Windows)
        if: runner.os == 'Windows'
        shell: msys2 {0}
        # Shared, not static: gameplay scripts compile to plugin DLLs that must
        # share one raylib + one C++ runtime with the host exe for cross-module
        # RTTI to work. raylib.dll and the MinGW runtime DLLs are packaged below.
        run: |
          git clone --depth 1 --branch 5.5 https://github.com/raysan5/raylib.git _raylib
          cmake -S _raylib -B _raylib/build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=/ucrt64 \
            -DBUILD_SHARED_LIBS=ON \
            -DBUILD_EXAMPLES=OFF
          cmake --build _raylib/build -j$(nproc)
          cmake --install _raylib/build

      # ── Configure ────────────────────────────────────────────────────────
      - name: Configure (Windows)
        if: runner.os == 'Windows'
        shell: msys2 {0}
        # No -static: exe and script DLLs must share the MinGW C++ runtime.
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release

      - name: Configure (Linux / macOS)
        if: runner.os != 'Windows'
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      # ── Build ─────────────────────────────────────────────────────────────
      - name: Build (Windows)
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: cmake --build build -j$(nproc)

      - name: Build (Linux / macOS)
        if: runner.os != 'Windows'
        run: cmake --build build --config Release -j

      # ── Package ───────────────────────────────────────────────────────────
      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: msys2 {0}
        # Bundle the exe with raylib.dll and exactly the MinGW runtime DLLs it
        # depends on (discovered via ldd). The user unzips and runs — no manual
        # DLL hunting, and no toolchain required.
        run: |
          tag="${{ github.ref_name }}"
          mkdir -p dist
          cp build/Indium.exe dist/
          cp /ucrt64/bin/libraylib.dll dist/
          ldd build/Indium.exe \
            | grep -iE '=> /(ucrt64|mingw64)/bin/' \
            | awk '{print $3}' \
            | while read -r dll; do cp -u "$dll" dist/; done
          cd dist && powershell -Command "Compress-Archive -Path * -DestinationPath ../Indium-$tag-windows.zip"

      - name: Package (Linux)
        if: runner.os == 'Linux'
        run: |
          TAG=${{ github.ref_name }}
          mkdir dist && cp build/Indium dist/
          tar czf "Indium-${TAG}-linux.tar.gz" -C dist Indium

      - name: Package (macOS)
        if: runner.os == 'macOS'
        run: |
          TAG=${{ github.ref_name }}
          mkdir dist && cp build/Indium dist/
          tar czf "Indium-${TAG}-macos.tar.gz" -C dist Indium

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: indium-${{ matrix.name }}
          path: "Indium-*.*"

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: "Indium-*.*"
