name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            name: linux
          - os: macos-latest
            name: macos
          - os: windows-latest
            name: windows

    runs-on: ${{ matrix.os }}
    name: Build (${{ matrix.name }})

    steps:
      - uses: actions/checkout@v4

      # ── Linux ────────────────────────────────────────────────────────────
      - name: Install raylib (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            libasound2-dev libx11-dev libxrandr-dev libxi-dev \
            libgl1-mesa-dev libglu1-mesa-dev libxcursor-dev \
            libxinerama-dev libwayland-dev libxkbcommon-dev
          git clone --depth 1 --branch 5.5 https://github.com/raysan5/raylib.git _raylib
          cmake -S _raylib -B _raylib/build \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_SHARED_LIBS=OFF \
            -DBUILD_EXAMPLES=OFF
          sudo cmake --build _raylib/build --target install -j$(nproc)

      # ── macOS ────────────────────────────────────────────────────────────
      - name: Install raylib (macOS)
        if: runner.os == 'macOS'
        run: brew install raylib

      # ── Windows (MSYS2 / MinGW-w64) ──────────────────────────────────────
      # MinGW bundles GLFW inside the raylib package, avoiding the link errors
      # that MSVC + vcpkg produce. GCC also handles raylib's C99 compound-literal
      # syntax without complaints.
      - name: Install raylib (Windows)
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-cmake
            mingw-w64-ucrt-x86_64-ninja
            git

      - name: Build raylib from source (Windows)
        if: runner.os == 'Windows'
        shell: msys2 {0}
        # Shared, not static: gameplay scripts compile to plugin DLLs that must
        # share one raylib + one C++ runtime with the host exe for cross-module
        # RTTI to work. raylib.dll and the MinGW runtime DLLs are packaged below.
        run: |
          git clone --depth 1 --branch 5.5 https://github.com/raysan5/raylib.git _raylib
          cmake -S _raylib -B _raylib/build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=/ucrt64 \
            -DBUILD_SHARED_LIBS=ON \
            -DBUILD_EXAMPLES=OFF
          cmake --build _raylib/build -j$(nproc)
          cmake --install _raylib/build

      # ── Configure ────────────────────────────────────────────────────────
      - name: Configure (Windows)
        if: runner.os == 'Windows'
        shell: msys2 {0}
        # No -static: exe and script DLLs must share the MinGW C++ runtime.
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release

      - name: Configure (Linux / macOS)
        if: runner.os != 'Windows'
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      # ── Build ─────────────────────────────────────────────────────────────
      - name: Build (Windows)
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: cmake --build build -j$(nproc)

      - name: Build (Linux / macOS)
        if: runner.os != 'Windows'
        # Bare -j means unlimited parallel jobs: every TU of all three targets
        # compiles at once (imgui_demo.cpp et al.) and OOM-kills the runner
        # ("Terminated" / "operation was canceled"). Cap at core count.
        # getconf is portable; macOS has no `nproc`.
        run: cmake --build build --config Release -j"$(getconf _NPROCESSORS_ONLN)"

      # ── Package ───────────────────────────────────────────────────────────
      # Bundle a portable MinGW toolchain so end users can compile gameplay
      # scripts without installing MSYS2 themselves. Sourced from the SAME
      # /ucrt64 that built the engine, guaranteeing an identical ABI (critical:
      # script DLLs share the engine's C++ runtime / RTTI — a mismatched
      # compiler reintroduces the cross-module dynamic_cast failures).
      #
      # A C++ compile drives a whole chain (verified end-to-end with a clean PATH):
      #   g++ (driver) → cc1plus (compiler) → as (assembler) → ld/collect2 (linker)
      # Each stage needs different files, and two non-obvious facts drove this recipe:
      #
      #   * cc1plus and as live OUTSIDE bin/ (in lib/gcc and x86_64-w64-mingw32/bin).
      #     Windows resolves an exe's DLLs from the exe's OWN folder first, and an
      #     end user won't have ucrt64 on PATH — so the runtime DLLs must be copied
      #     next to EVERY toolchain exe, not just into bin/.
      #   * The linker needs lib/*.a and lib/*.o (libstdc++, libmsvcrt, dllcrt2.o…),
      #     which sit in lib/ ROOT — copying only lib/gcc misses them and every link
      #     fails with "cannot find -lstdc++".
      - name: Bundle toolchain (Windows)
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: |
          TC=dist/toolchain
          mkdir -p "$TC/bin" "$TC/lib" "$TC/include" "$TC/x86_64-w64-mingw32"

          # 1. Driver + binutils that live in bin/.
          cp /ucrt64/bin/g++.exe /ucrt64/bin/gcc.exe /ucrt64/bin/ld.exe /ucrt64/bin/as.exe "$TC/bin/"

          # 2. GCC private dir: cc1plus, collect2, libgcc, crt*.o — the compiler core.
          cp -r /ucrt64/lib/gcc "$TC/lib/gcc"

          # 3. Link libraries + crt objects from lib/ ROOT (libstdc++.a, libmsvcrt.a,
          #    dllcrt2.o, …). Without these the linker can't resolve -lstdc++ etc.
          cp /ucrt64/lib/*.a /ucrt64/lib/*.o "$TC/lib/" 2>/dev/null || true

          # 4. Target sysroot: as/ld copies, system import libs.
          cp -r /ucrt64/x86_64-w64-mingw32/* "$TC/x86_64-w64-mingw32/"

          # 5. Headers: C++ standard library + Windows/CRT headers.
          cp -r /ucrt64/include/* "$TC/include/"

          # 6. Prune bulk that script compilation never uses (~90 MB): the C and LTO
          #    front-ends, Fortran, gdb. cc1plus (C++) and the link chain stay.
          rm -f "$TC"/lib/gcc/*/*/{cc1.exe,lto1.exe} 2>/dev/null || true
          rm -f "$TC"/bin/{gfortran*,gdb*,lto-dump*,gcc-ar*,gcc-nm*,gcc-ranlib*}.exe 2>/dev/null || true

          # 7. Distribute the runtime DLLs every toolchain exe needs into the folder
          #    of EACH exe (Windows looks in the exe's own dir; users have no ucrt64
          #    on PATH). Collect the DLLs once, then fan them out.
          mkdir -p "$TC/_dlls"
          find "$TC" -name '*.exe' | while read -r f; do
            ldd "$f" 2>/dev/null | awk '/\/ucrt64\/bin/ {print $3}'
          done | sort -u | while read -r dll; do cp -u "$dll" "$TC/_dlls/" 2>/dev/null || true; done
          find "$TC" -name '*.exe' -exec dirname {} \; | sort -u | while read -r d; do
            cp -un "$TC/_dlls"/*.dll "$d/" 2>/dev/null || true
          done
          rm -rf "$TC/_dlls"

          du -sh "$TC" || true

      # Bundle the script SDK: the headers + import library a gameplay script needs
      # to compile against. A release zip has no repo sources, so without this the
      # bundled compiler would have a toolchain but nothing to #include or link.
      # Mirrors the -I/-L paths ScriptManager uses (sdk/core, sdk/2D, sdk/include
      # and libIndium.dll.a / libraylib.dll.a beside the exe).
      - name: Bundle script SDK (Windows)
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: |
          SDK=dist/sdk
          mkdir -p "$SDK/include"
          # Engine + third-party headers the scripts include.
          cp -r core   "$SDK/"
          cp -r 2D     "$SDK/"
          cp -r include/* "$SDK/include/"
          # raylib's public headers (raylib.h, raymath.h, …) from the build prefix.
          cp /ucrt64/include/raylib.h   "$SDK/include/" 2>/dev/null || true
          cp /ucrt64/include/raymath.h  "$SDK/include/" 2>/dev/null || true
          cp /ucrt64/include/rlgl.h     "$SDK/include/" 2>/dev/null || true
          # Import library so scripts can link the engine's exported symbols
          # (ImGui + engine). raylib's own import lib ships beside the exe below.
          cp build/libIndium.dll.a dist/ 2>/dev/null || true
          cp /ucrt64/lib/libraylib.dll.a dist/ 2>/dev/null || true
          du -sh "$SDK" || true

      # Prove the WHOLE script-compilation path works end to end BEFORE zipping —
      # exactly as an end user would hit it: from plain PowerShell, with a PATH that
      # does NOT include MSYS2, compiling a real Indium script (not a bare probe).
      # This exercises every shipped piece together: bundled g++, the sdk/ headers
      # (engine + raylib), and the import libs. If anything is missing the job
      # fails and no broken release is published.
      - name: Verify scripting works offline (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          # Minimal PATH: system dirs only, no MSYS2/ucrt64 — a clean user machine.
          $env:PATH = "$env:SystemRoot\System32;$env:SystemRoot"
          $gpp = "dist\toolchain\bin\g++.exe"
          if (-not (Test-Path $gpp)) { throw "Bundled g++ not found at $gpp" }

          # A real gameplay script: derives from NativeScript, includes the engine
          # umbrella header and raylib — the same surface a user's script touches.
          @'
          #include "IndiumEngine.hpp"
          using namespace Indium;
          class VerifyProbe : public NativeScript {
          public:
              void OnUpdate(float dt) override {
                  if (entity && IsKeyDown(KEY_SPACE)) entity->position.x += dt;
              }
          };
          REGISTER_SCRIPT(VerifyProbe)
          '@ | Set-Content probe.cpp -Encoding ascii

          @'
          #include "IndiumEngine.hpp"
          INDIUM_EXPORT_SCRIPTS()
          '@ | Set-Content exports.cpp -Encoding ascii

          # Same include/link flags ScriptManager builds, but against dist/.
          & $gpp -shared -std=c++20 exports.cpp probe.cpp `
            -I"dist/sdk/core" -I"dist/sdk/2D" -I"dist/sdk/include" `
            -L"dist" -lIndium -lraylib `
            -o probe.dll
          if ($LASTEXITCODE -ne 0) { throw "Offline script compilation FAILED (exit $LASTEXITCODE)" }
          if (-not (Test-Path probe.dll)) { throw "Compile reported success but probe.dll is missing" }
          Remove-Item probe.cpp, exports.cpp, probe.dll -ErrorAction SilentlyContinue
          Write-Host "Real Indium script compiled offline (bundled toolchain + sdk, no MSYS2)."

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: msys2 {0}
        # Bundle the exe with raylib.dll and exactly the MinGW runtime DLLs it
        # depends on (discovered via ldd), plus the verified toolchain above.
        # The user unzips and runs — no manual DLL hunting, no compiler install.
        run: |
          tag="${{ github.ref_name }}"
          cp build/Indium.exe dist/
          cp /ucrt64/bin/libraylib.dll dist/
          ldd build/Indium.exe \
            | grep -iE '=> /(ucrt64|mingw64)/bin/' \
            | awk '{print $3}' \
            | while read -r dll; do cp -u "$dll" dist/; done
          cd dist && powershell -Command "Compress-Archive -Path * -DestinationPath ../Indium-$tag-windows.zip"

      - name: Package (Linux)
        if: runner.os == 'Linux'
        run: |
          TAG=${{ github.ref_name }}
          mkdir dist && cp build/Indium dist/
          tar czf "Indium-${TAG}-linux.tar.gz" -C dist Indium

      - name: Package (macOS)
        if: runner.os == 'macOS'
        run: |
          TAG=${{ github.ref_name }}
          mkdir dist && cp build/Indium dist/
          tar czf "Indium-${TAG}-macos.tar.gz" -C dist Indium

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: indium-${{ matrix.name }}
          path: "Indium-*.*"

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: "Indium-*.*"
