name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-22.04
    name: Build & Test (linux)

    steps:
      - uses: actions/checkout@v4

      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            libasound2-dev libx11-dev libxrandr-dev libxi-dev \
            libgl1-mesa-dev libglu1-mesa-dev libxcursor-dev \
            libxinerama-dev libwayland-dev libxkbcommon-dev

      # raylib takes ~2 min to build; cache the install prefix keyed on version.
      - name: Cache raylib
        id: cache-raylib
        uses: actions/cache@v4
        with:
          path: ~/raylib-install
          key: raylib-5.5-ubuntu-22.04

      - name: Build raylib
        if: steps.cache-raylib.outputs.cache-hit != 'true'
        run: |
          git clone --depth 1 --branch 5.5 https://github.com/raysan5/raylib.git _raylib
          cmake -S _raylib -B _raylib/build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=$HOME/raylib-install \
            -DBUILD_SHARED_LIBS=OFF \
            -DBUILD_EXAMPLES=OFF
          cmake --build _raylib/build --target install -j$(nproc)

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_PREFIX_PATH=$HOME/raylib-install

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Run tests
        run: ctest --test-dir build --output-on-failure
