name: Deploy Website

on:
  push:
    branches: [main]
    paths:
      - "website/**"
      - "docs/API.md"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      # api.html is generated from docs/API.md so the reference can never
      # drift from the markdown source.
      - name: Rebuild API reference
        run: |
          pip install markdown
          python3 website/build_api.py

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          path: website

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
